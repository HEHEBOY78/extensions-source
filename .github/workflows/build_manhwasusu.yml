name: Build ManhwaSusu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build extension
        run: ./gradlew :src:en:manhwasusu:assembleDebug -x spotlessCheck --info > build_log.txt 2>&1 || true
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ManhwaSusu
          path: src/en/manhwasusu/build/outputs/apk/debug/*.apk
