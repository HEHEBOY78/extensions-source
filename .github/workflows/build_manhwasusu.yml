name: Build ManhwaSusu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build extension
        run: ./gradlew :src:en:manhwasusu:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ManhwaSusu
          path: src/en/manhwasusu/build/outputs/apk/debug/*.apk
